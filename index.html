<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para ti, mi amor 💖</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a0033, #330022, #220011);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Corazones y estrellas flotando */
    .background-hearts {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart, .star {
      position: absolute;
      font-size: 1.5em;
      animation: float 15s linear infinite;
      opacity: 0.6;
    }

    .heart { color: #ff4d94; }
    .star  { color: #ffd700; animation-duration: 20s; }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-100px) rotate(360deg); }
    }

    .container {
      max-width: 750px;
      background: rgba(20, 5, 30, 0.85);
      border: 2px solid #ff66a3;
      border-radius: 30px;
      box-shadow: 0 0 40px rgba(255, 77, 148, 0.6);
      padding: 50px 35px;
      text-align: center;
      z-index: 2;
      backdrop-filter: blur(8px);
    }

    h1 {
      color: #ff99cc;
      font-size: 2.9em;
      text-shadow: 0 0 15px #ff4d94;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #ffccdd;
      font-size: 1.35em;
      margin-bottom: 40px;
      text-shadow: 0 0 10px #ff66a3;
    }

    .message {
      margin: 45px 0;
      padding: 45px 30px;
      background: rgba(50, 10, 60, 0.8);
      border-radius: 25px;
      font-size: 1.6em;
      line-height: 1.45;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #ff99cc;
      color: #ffe6f2;
      box-shadow: 0 0 25px rgba(255, 153, 204, 0.5);
    }

    button {
      background: linear-gradient(45deg, #ff4d94, #ff66b3);
      color: white;
      font-size: 1.45em;
      padding: 20px 55px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 25px rgba(255, 77, 148, 0.7);
      transition: all 0.3s;
    }

    button:hover {
      transform: scale(1.12);
      box-shadow: 0 0 35px rgba(255, 77, 148, 0.9);
    }

    .heart-big {
      font-size: 3.8em;
      margin-bottom: 10px;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Corazones y estrellas flotando -->
  <div class="background-hearts" id="hearts"></div>

  <div class="container">
    <span class="heart-big">💖</span>
    <h1>Para ti, mi amor</h1>
    <p class="subtitle">Presiona y deja que mi corazón te hable ❤️</p>
    
    <div class="message" id="mensaje">
      Presiona el botón para recibir un mensaje especial...
    </div>

    <button onclick="mensajeAleatorio()">
      🌟 Dame otro mensaje de amor
    </button>
  </div>

  <script>
    // Mensajes románticos (30+)
    const mensajes = [
      "Mi amor, cada día a tu lado es un regalo del universo ❤️",
      "Eres lo mejor que me ha pasado en la vida. Te amo infinitamente.",
      "Contigo he encontrado mi hogar y mi felicidad.",
      "Eres mi persona favorita en todo el universo 🌌",
      "Felicidades por ser tan increíble, mi vida.",
      "Tu sonrisa ilumina hasta mis noches más oscuras.",
      "Gracias por amarme tal como soy. Eres mi todo.",
      "No imagino mi vida sin ti. Eres mi mayor bendición.",
      "Te amo más de lo que las palabras pueden expresar 💖",
      "Eres mi paz, mi aventura y mi mayor amor.",
      "Cada segundo contigo es magia pura.",
      "Eres mi sueño hecho realidad.",
      "Mi corazón late diferente cuando estás cerca.",
      "Contigo el tiempo se detiene de lo bonito.",
      "Eres la razón por la que creo en el amor verdadero.",
      "Gracias por hacerme tan feliz todos los días.",
      "Te amo en mis mejores y peores momentos.",
      "Cada vez que te miro, me enamoro más.",
      "Eres mi refugio seguro en este mundo.",
      "Mi amor por ti crece más cada día.",
      "Eres la mejor parte de mi historia de amor.",
      "Contigo todo se siente como en casa.",
      "Eres mi milagro diario.",
      "Te elijo a ti, siempre y en todos los universos.",
      "Tu amor es mi fuerza más grande.",
      "Amarte es lo más bonito que hago todos los días.",
      "Eres mi destino y mi mejor casualidad.",
      "Sin ti nada tendría el mismo color.",
      "Eres mi persona favorita en este y en todos los mundos."
    ];

    function mensajeAleatorio() {
      const randomIndex = Math.floor(Math.random() * mensajes.length);
      document.getElementById("mensaje").innerHTML = mensajes[randomIndex];
    }

    // Crear corazones y estrellas flotando
    function createFloatingElements() {
      const container = document.getElementById('hearts');
      for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = Math.random() > 0.5 ? 'heart' : 'star';
        el.textContent = Math.random() > 0.5 ? '❤️' : '✨';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (Math.random() * 15 + 12) + 's';
        el.style.animationDelay = '-' + Math.random() * 20 + 's';
        el.style.opacity = Math.random() * 0.7 + 0.3;
        container.appendChild(el);
      }
    }

    // Iniciar animaciones
    createFloatingElements();
  </script>
</body>
</html>
