<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para ti, mi amor 💖</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ffe6f2, #f8d7e8, #ffe4f0);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 750px;
      background: white;
      border-radius: 30px;
      box-shadow: 0 25px 50px rgba(233, 30, 99, 0.3);
      padding: 50px 35px;
      text-align: center;
    }
    h1 {
      color: #e91e63;
      font-size: 2.9em;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #c2185b;
      font-size: 1.35em;
      margin-bottom: 40px;
    }
    .message {
      margin: 45px 0;
      padding: 45px 30px;
      background: #fff0f5;
      border-radius: 25px;
      font-size: 1.6em;
      line-height: 1.45;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 5px solid #ffc1e3;
      color: #333;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    button {
      background: #e91e63;
      color: white;
      font-size: 1.45em;
      padding: 20px 55px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 12px 25px rgba(233, 30, 99, 0.4);
      transition: all 0.3s;
    }
    button:hover {
      background: #c2185b;
      transform: scale(1.1);
    }
    .heart {
      font-size: 3.5em;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="heart">💖</div>
    <h1>Para ti, mi amor</h1>
    <p class="subtitle">Presiona el botón y recibe un mensaje especial de mi corazón ❤️</p>
    
    <div class="message" id="mensaje">
      Presiona el botón para recibir un mensaje de amor...
    </div>

    <button onclick="mensajeAleatorio()">
      🎲 Dame otro mensaje de amor
    </button>
  </div>

  <script>
    const mensajes = [
      "Mi amor, cada día a tu lado es un regalo del universo ❤️",
      "Eres lo mejor que me ha pasado en la vida. Te amo infinitamente.",
      "Contigo he encontrado mi hogar y mi felicidad. Gracias por existir.",
      "Eres mi persona favorita en todo el mundo 🌍💕",
      "Felicidades por ser tan increíble, mi vida. Te elijo hoy y siempre.",
      "Tu sonrisa ilumina mis días más oscuros. Te amo con todo mi corazón.",
      "Gracias por amarme tal como soy. Eres mi todo.",
      "No imagino mi vida sin ti. Eres mi mayor bendición.",
      "Te amo más de lo que las palabras pueden expresar ❤️",
      "Eres mi paz, mi aventura y mi mayor amor.",
      "Cada segundo contigo vale más que mil días sin ti 💕",
      "Eres mi sueño hecho realidad. Te amo muchísimo.",
      "Mi corazón late diferente cuando estás cerca ❤️",
      "Contigo el tiempo vuela, pero sin ti se detiene.",
      "Eres la razón por la que creo en el amor verdadero.",
      "Gracias por hacerme tan feliz todos los días.",
      "Te amo en mis mejores momentos y en los peores también.",
      "Eres mi refugio, mi alegría y mi persona favorita.",
      "Cada vez que te miro, me enamoro un poquito más.",
      "Eres la mejor parte de mi día, todos los días.",
      "Mi amor por ti no tiene fecha de caducidad 💖",
      "Contigo todo es más bonito, incluso los días normales.",
      "Eres mi milagro diario. Gracias por aparecer en mi vida.",
      "Te elijo a ti, hoy, mañana y todos los días de mi vida.",
      "Tu amor es mi fuerza y mi mayor motivación.",
      "Eres la definición perfecta de lo que significa amar.",
      "No necesito nada más mientras te tenga a ti.",
      "Mi corazón te pertenece desde el primer día.",
      "Eres mi destino, mi casualidad y mi mejor decisión.",
      "Amarte es la cosa más fácil y bonita que hago todos los días."
    ];

    function mensajeAleatorio() {
      const randomIndex = Math.floor(Math.random() * mensajes.length);
      document.getElementById("mensaje").innerHTML = mensajes[randomIndex];
    }
  </script>

</body>
</html>
